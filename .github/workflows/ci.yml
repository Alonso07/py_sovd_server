name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  quick-checks:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Python 3.11
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Install Poetry
      run: pip install poetry

    - name: Load cached venv
      id: cached-poetry-dependencies
      uses: actions/cache@v4
      with:
        path: .venv
        key: venv-3.11-${{ hashFiles('**/poetry.lock') }}

    - name: Install dependencies
      run: poetry install --no-interaction
      if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'

    - name: Install dependencies (cache hit)
      run: poetry install --no-interaction --sync
      if: steps.cached-poetry-dependencies.outputs.cache-hit == 'true'

    - name: Run linting
      run: |
        poetry run flake8 src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
        poetry run flake8 src/ tests/ --count --exit-zero --max-complexity=10 --max-line-length=88 --statistics

    - name: Check code formatting
      run: |
        poetry run black --check --diff \
          src/sovd_server/config_loader.py \
          src/sovd_server/enhanced_server.py \
          src/sovd_server/run_enhanced_server.py \
          src/sovd_server/__init__.py \
          src/sovd_server/parse_pdf.py \
          tests/

    - name: Run security checks
      run: |
        mkdir -p reports
        poetry run bandit -r src/ -f json -o reports/bandit-report.json || true
        poetry run safety check --json --output reports/safety-report.json || true

    - name: Upload security reports
      uses: actions/upload-artifact@v7
      with:
        name: security-reports
        path: |
          reports/bandit-report.json
          reports/safety-report.json

  test:
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install Poetry
      run: pip install poetry

    - name: Install dependencies
      run: poetry install --no-interaction

    - name: Run tests with coverage
      run: |
        poetry run pytest tests/ -v --cov=sovd_server --cov-report=xml --cov-report=term-missing

    - name: Check if coverage file exists
      shell: bash
      run: |
        if [ -f "coverage.xml" ]; then
          echo "Coverage file found"
        else
          echo '<?xml version="1.0" ?><coverage></coverage>' > coverage.xml
        fi

    - name: Upload coverage to Codecov (optional)
      uses: codecov/codecov-action@v5
      if: always()
      with:
        files: ./coverage.xml
        name: codecov-${{ matrix.os }}-${{ matrix.python-version }}
        fail_ci_if_error: false

  build:
    needs: [quick-checks, test]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Python 3.11
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Install Poetry
      run: pip install poetry

    - name: Install dependencies (no dev)
      run: poetry install --no-interaction --without dev

    - name: Build package (resolve symlinks for wheel)
      run: chmod +x scripts/build_resolve_symlinks.sh && ./scripts/build_resolve_symlinks.sh build

    - name: Upload build artifacts
      uses: actions/upload-artifact@v7
      with:
        name: dist-files
        path: dist/
