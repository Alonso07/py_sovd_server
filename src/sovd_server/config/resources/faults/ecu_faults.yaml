# ECU Faults Configuration
# Contains fault definitions for ECU-related issues

faults:
  - id: "ECU-001"
    name: "ECU Communication Error"
    description: "Loss of communication with the Engine Control Unit"
    severity: "critical"
    scope: "system"
    status: "active"
    mask: "FF"
    tags: ["communication", "ecu", "critical", "system"]
    
  - id: "ECU-002"
    name: "ECU Memory Error"
    description: "Memory corruption or failure in ECU flash memory"
    severity: "critical"
    scope: "ecu"
    status: "inactive"
    mask: "01"
    tags: ["memory", "ecu", "critical", "hardware"]
    
  - id: "ECU-003"
    name: "ECU Temperature Warning"
    description: "ECU operating temperature exceeds normal range"
    severity: "warning"
    scope: "ecu"
    status: "active"
    mask: "04"
    tags: ["temperature", "ecu", "warning", "thermal"]
    
  - id: "ECU-004"
    name: "ECU Voltage Low"
    description: "ECU supply voltage below minimum threshold"
    severity: "warning"
    scope: "electrical"
    status: "inactive"
    tags: ["voltage", "ecu", "warning", "electrical"]
    
  - id: "ECU-005"
    name: "ECU Calibration Error"
    description: "Calibration data validation failed"
    severity: "error"
    scope: "calibration"
    status: "active"
    tags: ["calibration", "ecu", "error", "software"]
    
  - id: "ECU-006"
    name: "ECU Software Version Mismatch"
    description: "Installed software version does not match expected version"
    severity: "warning"
    scope: "software"
    status: "inactive"
    tags: ["software", "ecu", "warning", "version"]
    
  - id: "ECU-007"
    name: "ECU Sensor Communication Error"
    description: "Communication failure with engine sensors"
    severity: "error"
    scope: "sensors"
    status: "active"
    tags: ["sensors", "ecu", "error", "communication"]
    
  - id: "ECU-008"
    name: "ECU Performance Degradation"
    description: "ECU processing performance below expected levels"
    severity: "warning"
    scope: "performance"
    status: "inactive"
    tags: ["performance", "ecu", "warning", "system"]

  - id: "ECU-RR"
    name: "Round-robin demo fault"
    description: "Cycles HTTP status/body on each GET .../faults/ECU-RR"
    severity: "warning"
    scope: "demo"
    status: "inactive"
    tags: ["demo", "round-robin"]
    responses:
      - status: 200
        body:
          demo: "fault-step-a"
      - status: 404
        body:
          error: "fault-not-found-demo"
      - status: 200
        body:
          demo: "fault-step-c"
