openapi: 3.0.3
info:
  contact:
    name: SOVD API Support
  description: "This API specification defines the Service-Oriented Vehicle Diagnostics\
    \ (SOVD) interface \naccording to ISO/DIS 17978-3:2025. The SOVD API provides\
    \ access to vehicle diagnostics, \nfault handling, data resources, operations,\
    \ target modes, and configuration management.\n"
  license:
    name: ISO/DIS 17978-3:2025
  title: SOVD (Service-Oriented Vehicle Diagnostics) API
  version: 1.0.0
servers:
- description: SOVD Server
  url: "https://{sovd-server-host}/{exve-manufacturer-specific}"
  variables:
    sovd-server-host:
      default: localhost
      description: Host name of the SOVD Server
    exve-manufacturer-specific:
      default: ""
      description: Optional path element to avoid clashes in URIs
# security:
# - BearerAuth: []
# - ApiKeyAuth: []
paths:
  /version-info:
    get:
      description: Provides information about all supported versions of the SOVD standard
      operationId: get_version_info
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionInfo"
          description: The request was successful
      summary: Read all supported versions of the SOVD server
      x-openapi-router-controller: sovd_server.controllers.default_controller
  /{entity-collection}:
    get:
      description: Provides the list of contained Entities for each requested Entity
        collection
      operationId: get_entities
      parameters:
      - description: "Entity collection type (areas, components, apps)"
        explode: false
        in: path
        name: entity-collection
        required: true
        schema:
          enum:
          - areas
          - components
          - apps
          type: string
        style: simple
      - description: Filter by tags
        explode: true
        in: query
        name: tags
        required: false
        schema:
          items:
            type: string
          type: array
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EntityCollection"
          description: The request was successful
      summary: Query for Entities from an SOVD server
      x-openapi-router-controller: sovd_server.controllers.default_controller
  /{entity-path}:
    get:
      description: Returns the capabilities of an Entity
      operationId: get_entity_capabilities
      parameters:
      - description: Path to the Entity
        explode: false
        in: path
        name: entity-path
        required: true
        schema:
          pattern: "^(areas|components|apps)/[^/]+"
          type: string
        style: simple
      - description: Include JSON schema in response
        explode: true
        in: query
        name: include-schema
        required: false
        schema:
          default: false
          type: boolean
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EntityCapabilities"
          description: The request was successful
      summary: Query for capabilities of an Entity
      x-openapi-router-controller: sovd_server.controllers.default_controller
  /{entity-path}/configurations:
    delete:
      description: Resets all configuration resources to their default values
      operationId: reset_all_configurations
      parameters:
      - description: Path to the Entity
        explode: false
        in: path
        name: entity-path
        required: true
        schema:
          pattern: "^(areas|components|apps)/[^/]+"
          type: string
        style: simple
      responses:
        "204":
          description: All configurations reset successfully
      summary: Reset all configurations to default value
      x-openapi-router-controller: sovd_server.controllers.default_controller
  /{entity-path}/configurations/{configuration-id}:
    delete:
      description: Resets a specific configuration resource to its default value
      operationId: reset_configuration
      parameters:
      - description: Path to the Entity
        explode: false
        in: path
        name: entity-path
        required: true
        schema:
          pattern: "^(areas|components|apps)/[^/]+"
          type: string
        style: simple
      - description: Configuration resource identifier
        explode: false
        in: path
        name: configuration-id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "204":
          description: Configuration reset successfully
      summary: Reset configuration to default value
      x-openapi-router-controller: sovd_server.controllers.default_controller
    get:
      description: Provides the current value of a specific configuration resource
      operationId: get_configuration
      parameters:
      - description: Path to the Entity
        explode: false
        in: path
        name: entity-path
        required: true
        schema:
          pattern: "^(areas|components|apps)/[^/]+"
          type: string
        style: simple
      - description: Configuration resource identifier
        explode: false
        in: path
        name: configuration-id
        required: true
        schema:
          type: string
        style: simple
      - description: Include JSON schema in response
        explode: true
        in: query
        name: include-schema
        required: false
        schema:
          default: false
          type: boolean
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Configuration"
          description: The request was successful
      summary: Read a configuration resource
      x-openapi-router-controller: sovd_server.controllers.default_controller
    put:
      description: Updates the value of a specific configuration resource
      operationId: update_configuration
      parameters:
      - description: Path to the Entity
        explode: false
        in: path
        name: entity-path
        required: true
        schema:
          pattern: "^(areas|components|apps)/[^/]+"
          type: string
        style: simple
      - description: Configuration resource identifier
        explode: false
        in: path
        name: configuration-id
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfigurationWrite"
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/ConfigurationWriteMultipart"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Configuration"
          description: Configuration updated successfully
      summary: Write a configuration resource
      x-openapi-router-controller: sovd_server.controllers.default_controller
